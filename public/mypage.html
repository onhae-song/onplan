<style>
:root{
  --bg:#f5f5f7;--white:#fff;--black:#111;
  --accent:#a8cc00;--accent-bright:#d4f53c;
  --accent-bg:rgba(168,204,0,.08);--accent-border:rgba(168,204,0,.2);
  --border:#e0e0e0;--border-light:#ebebeb;
  --g800:#333;--g700:#555;--g600:#777;--g500:#999;--g400:#aaa;--g300:#ccc;--g100:#f0f0f0;
  --en:'Outfit',sans-serif;--kr:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--kr);background:var(--bg);color:var(--black);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* NAV */
.nav{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:100;}
.nav-logo svg{height:22px;width:auto;}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-link{font-size:11px;color:var(--g500);text-decoration:none;letter-spacing:1px;}
.nav-link:hover{color:var(--black);}

/* LOGIN PROMPT */
.login-prompt{max-width:440px;margin:120px auto;text-align:center;padding:0 24px;}
.login-prompt h2{font-family:var(--en);font-size:28px;font-weight:800;margin-bottom:8px;}
.login-prompt p{font-size:14px;color:var(--g600);margin-bottom:24px;}
.btn-google{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:var(--black);color:var(--white);border:none;font-family:var(--en);font-weight:700;font-size:14px;cursor:pointer;border-radius:8px;}
.btn-google:hover{background:#222;}

/* LAYOUT */
.container{max-width:960px;margin:0 auto;padding:32px 24px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.page-title{font-family:var(--en);font-size:28px;font-weight:800;}

/* PLAN CARD */
.plan-card{background:var(--white);border:1px solid var(--border);padding:24px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;}
.plan-left{display:flex;align-items:center;gap:16px;}
.plan-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--g100);}
.plan-name{font-size:16px;font-weight:700;}
.plan-email{font-size:12px;color:var(--g500);margin-top:2px;}
.plan-badge{padding:4px 12px;font-family:var(--en);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:4px;}
.plan-free{background:var(--g100);color:var(--g600);}
.plan-pro{background:var(--accent-bg);border:1px solid var(--accent-border);color:var(--accent);}
.plan-max{background:var(--black);color:var(--accent-bright);}
.plan-lifetime{background:var(--black);color:var(--accent-bright);}
.plan-right{display:flex;align-items:center;gap:12px;}
.btn-upgrade{padding:8px 18px;background:var(--accent);color:var(--black);border:none;font-family:var(--en);font-weight:700;font-size:12px;cursor:pointer;border-radius:6px;}
.btn-upgrade:hover{background:var(--accent-bright);}
.btn-logout{padding:8px 14px;background:none;border:1px solid var(--border);color:var(--g500);font-size:11px;cursor:pointer;border-radius:6px;font-family:inherit;}
.btn-logout:hover{border-color:var(--g700);color:var(--g800);}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:24px;}
.tab{padding:12px 20px;font-size:13px;font-weight:600;color:var(--g500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;}
.tab:hover{color:var(--black);}
.tab.active{color:var(--black);border-bottom-color:var(--accent);}

/* PROJECT LIST */
.project-list{display:flex;flex-direction:column;gap:12px;}
.project-item{background:var(--white);border:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .2s;}
.project-item:hover{border-color:var(--g300);box-shadow:0 2px 8px rgba(0,0,0,.04);}
.project-info{flex:1;}
.project-name{font-size:15px;font-weight:700;margin-bottom:4px;}
.project-meta{font-size:12px;color:var(--g500);display:flex;gap:12px;}
.project-status{display:inline-block;padding:2px 8px;font-size:10px;font-weight:600;border-radius:4px;letter-spacing:.5px;}
.status-collecting{background:#FFF3E0;color:#E65100;}
.status-complete{background:var(--accent-bg);color:var(--accent);}
.project-actions{display:flex;gap:8px;}
.btn-sm{padding:6px 14px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--white);cursor:pointer;border-radius:4px;font-family:inherit;color:var(--g700);}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm-accent{background:var(--accent);color:var(--black);border-color:var(--accent);}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;}
.empty-icon{font-size:40px;color:var(--g300);margin-bottom:16px;}
.empty-title{font-size:16px;font-weight:700;margin-bottom:6px;}
.empty-desc{font-size:13px;color:var(--g500);margin-bottom:20px;}
.btn-new{display:inline-block;padding:12px 24px;background:var(--black);color:var(--white);border:none;font-family:var(--en);font-weight:700;font-size:13px;cursor:pointer;border-radius:8px;text-decoration:none;}
.btn-new:hover{background:#222;}

/* PRD DETAIL */
.prd-detail{display:none;}
.prd-back{font-size:12px;color:var(--g500);cursor:pointer;margin-bottom:16px;display:inline-flex;align-items:center;gap:4px;}
.prd-back:hover{color:var(--black);}
.prd-detail-header{margin-bottom:24px;}
.prd-detail-title{font-family:var(--en);font-size:22px;font-weight:800;margin-bottom:4px;}
.prd-detail-meta{font-size:12px;color:var(--g500);}
.prd-section{background:var(--white);border:1px solid var(--border);margin-bottom:16px;}
.prd-sec-hd{padding:16px 24px 12px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;}
.prd-sec-num{font-family:var(--en);font-size:10px;font-weight:600;color:var(--accent);letter-spacing:1px;margin-right:10px;}
.prd-sec-title{font-size:15px;font-weight:700;}
.prd-sec-body{padding:20px 24px;font-size:14px;line-height:1.8;color:var(--g700);}
.prd-sec-body h3{font-size:13px;font-weight:700;color:var(--black);margin:16px 0 6px;}
.prd-sec-body h3:first-child{margin-top:0;}
.prd-sec-body p{margin-bottom:8px;}
.prd-sec-body table{width:100%;border-collapse:collapse;margin:8px 0;}
.prd-sec-body th,.prd-sec-body td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:13px;}
.prd-sec-body th{color:var(--g500);font-weight:600;font-size:10px;letter-spacing:.5px;text-transform:uppercase;}
.prd-locked{opacity:.3;filter:blur(4px);user-select:none;pointer-events:none;min-height:80px;}
.lock-msg{text-align:center;font-size:12px;color:var(--g500);padding:8px 0;}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--g500);font-size:14px;}

/* RESPONSIVE */
@media(max-width:768px){
  .nav{padding:0 16px;}
  .container{padding:20px 16px;}
  .plan-card{flex-direction:column;gap:16px;align-items:flex-start;}
  .plan-right{width:100%;justify-content:flex-end;}
  .project-item{flex-direction:column;align-items:flex-start;gap:12px;}
  .project-actions{width:100%;}
}

.fade{animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>

<!-- LOGIN PROMPT (shown when not logged in) -->
<div id="login-view" class="login-prompt" style="display:none;">
  <h2>Sign in to continue</h2>
  <p>프로젝트를 관리하고 PRD를 확인하려면 로그인하세요.</p>
  <button class="btn-google" onclick="googleLogin()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Sign in with Google
  </button>
</div>

<!-- MAIN CONTENT (shown when logged in) -->
<div id="main-view" style="display:none;">
  <div class="container">

    <!-- Plan Card -->
    <div class="plan-card fade" id="plan-card">
      <div class="plan-left">
        <img class="plan-avatar" id="my-avatar" src="" alt="">
        <div>
          <div class="plan-name" id="my-name"></div>

      </div>

    <!-- Project List -->
    <div id="tab-projects">

    <div id="tab-settings" style="display:none;">
      <div style="background:var(--white);border:1px solid var(--border);padding:24px;">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:16px;">Account</h3>
        <div style="font-size:13px;color:var(--g600);margin-bottom:8px;">Email: <strong id="settings-email"></strong></div>
        <div style="font-size:13px;color:var(--g600);margin-bottom:8px;">Plan: <strong id="settings-plan"></strong></div>
        <div style="font-size:13px;color:var(--g600);margin-bottom:20px;">Member since: <strong id="settings-since"></strong></div>

<script>
const SUPABASE_URL='https://dtwgrxsepotwbpaqssgm.supabase.co';
const SUPABASE_KEY='sb_publishable_IZ2yTDHofociWRxoYZU3pg_8MHHO9St';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let currentUser=null;
let userPlan='free';

// ===== AUTH =====
async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(session?.user){
    currentUser=session.user;
    await loadPlan();
    showMain();
  } else {
    document.getElementById('login-view').style.display='block';
  }
  sb.auth.onAuthStateChange(async(ev,session)=>{
    if(session?.user){
      currentUser=session.user;
      await loadPlan();
      showMain();
    } else {
      currentUser=null;
      document.getElementById('main-view').style.display='none';
      document.getElementById('login-view').style.display='block';
    }
  });
}

async function googleLogin(){
  await sb.auth.signInWithOAuth({
    provider:'google',
    options:{redirectTo:window.location.origin+'/mypage.html'}
  });
}

async function logOut(){
  await sb.auth.signOut();
  location.reload();
}

// ===== PLAN =====
async function loadPlan(){
  if(!currentUser)return;
  const{data,error}=await sb.from('user_plans').select('plan').eq('user_id',currentUser.id).single();
  if(error)console.warn('loadPlan error:',error.message);
  userPlan=data?.plan||'free';
  console.log('userPlan loaded:',userPlan);
}

function showMain(){
  document.getElementById('login-view').style.display='none';
  document.getElementById('main-view').style.display='block';

  // Profile
  const meta=currentUser.user_metadata||{};
  document.getElementById('my-name').textContent=meta.full_name||meta.name||currentUser.email;
  document.getElementById('my-email').textContent=currentUser.email;
  document.getElementById('settings-email').textContent=currentUser.email;
  document.getElementById('settings-plan').textContent=userPlan.toUpperCase();
  document.getElementById('settings-since').textContent=new Date(currentUser.created_at).toLocaleDateString();
  const av=document.getElementById('my-avatar');
  if(meta.avatar_url){av.src=meta.avatar_url;}

  // Plan badge
  const badge=document.getElementById('my-plan-badge');
  badge.textContent=userPlan.toUpperCase();
  badge.className='plan-badge plan-'+userPlan;
  if(userPlan!=='free'){
    document.getElementById('btn-upgrade').style.display='none';
  }

  loadProjects();
}

// ===== PROJECTS =====
async function loadProjects(){
  const listEl=document.getElementById('project-list');
  listEl.innerHTML='<div class="loading">Loading...</div>';

  const{data:projects,error}=await sb.from('projects')
    .select('id,name,description,status,phase,created_at')
    .eq('owner_id',currentUser.id)
    .order('created_at',{ascending:false});

  if(error){
    listEl.innerHTML='<div class="empty"><div class="empty-title">Failed to load projects</div></div>';
    return;
  }

  if(!projects||projects.length===0){
    listEl.innerHTML=`
      <div class="empty fade">
        <div class="empty-icon">+</div>
        <div class="empty-title">No projects yet</div>
        <div class="empty-desc">Create your first project and start interviewing your team.</div>
        <a href="#" onclick="checkAndCreateProject();return false;" class="btn-new">+ New Project</a>
      </div>`;
    document.getElementById('project-count').textContent='My Projects';
    return;
  }

  document.getElementById('project-count').textContent='My Projects ('+projects.length+')';

  // Load interview counts
  const projectIds=projects.map(p=>p.id);
  const{data:interviews}=await sb.from('interviews')
    .select('project_id')
    .in('project_id',projectIds);
  const interviewCounts={};
  (interviews||[]).forEach(i=>{interviewCounts[i.project_id]=(interviewCounts[i.project_id]||0)+1;});

  listEl.innerHTML='';
  projects.forEach((p,idx)=>{
    const statusClass=p.status==='complete'?'status-complete':'status-collecting';
    const statusLabel=p.status==='complete'?'PRD Complete':'Collecting';
    const count=interviewCounts[p.id]||0;
    const date=new Date(p.created_at).toLocaleDateString();
    const div=document.createElement('div');
    div.className='project-item fade';
    div.style.animationDelay=idx*.05+'s';
    div.innerHTML=`
      <div class="project-info">
        <div class="project-name">${p.name}</div>
        <div class="project-meta">
          <span>${date}</span>
          <span>${count} interviews</span>
          <span class="project-status ${statusClass}">${statusLabel}</span>
        </div>
      </div>
      <div class="project-actions">
        ${p.status==='complete'?`<button class="btn-sm btn-sm-accent" id="vprd-${p.id}">View PRD</button>`:''}
        <button class="btn-sm" id="del-${p.id}">Delete</button>
      </div>`;
    // onclick 핸들러 직접 등록
    if(p.status==='complete'){
      const vprdBtn=div.querySelector(`#vprd-${p.id}`);
      if(vprdBtn) vprdBtn.onclick=(e)=>{e.stopPropagation();window.location.href='app.html?id='+p.id;};
    }
    const delBtn=div.querySelector(`#del-${p.id}`);
    if(delBtn) delBtn.onclick=(e)=>{e.stopPropagation();deleteProject(p.id);};
    // 프로젝트 카드 클릭 → app.html로 이동 (상태 무관)
    div.style.cursor='pointer';
    div.onclick=(e)=>{
      if(e.target.closest('button')) return; // 버튼 클릭은 제외
      window.location.href='app.html?id='+p.id;
    };
    listEl.appendChild(div);
  });
}

async function deleteProject(id){
  if(!confirm('이 프로젝트를 삭제할까요?'))return;
  try{
    await sb.from('interviews').delete().eq('project_id',id);
    await sb.from('prds').delete().eq('project_id',id);
    const{error}=await sb.from('projects').delete()
      .eq('id',id)
      .eq('owner_id',currentUser.id);
    if(error)throw new Error(error.message);
    loadProjects();
  }catch(e){
    alert('삭제 실패: '+e.message);
  }
}

// ===== PRD DETAIL =====
async function viewPrd(projectId,projectName){
  const{data}=await sb.from('prds').select('sections,created_at').eq('project_id',projectId).single();
  if(!data||!data.sections){
    alert('PRD not found.');
    return;
  }

  document.getElementById('tab-projects').style.display='none';
  document.getElementById('prd-detail').style.display='block';
  document.getElementById('prd-detail-title').textContent=projectName;
  document.getElementById('prd-detail-meta').textContent='Generated '+new Date(data.created_at).toLocaleDateString()+' · OnPlan AI';

  const container=document.getElementById('prd-detail-sections');
  container.innerHTML='';

  const sections=data.sections;
  const canViewAll=userPlan!=='free';

  const FREE_LIMIT=3;
  sections.forEach((s,i)=>{
    const locked=!canViewAll&&i>=FREE_LIMIT;
    const sec=document.createElement('div');
    sec.className='prd-section fade';
    sec.style.animationDelay=i*.06+'s';

    let bodyHtml='';
    if(locked){
      bodyHtml=`<div class="prd-sec-body" style="position:relative;min-height:80px">
        <div style="filter:blur(4px);opacity:.3;pointer-events:none;user-select:none">${s.body||''}</div>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px">
          <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><rect x="3" y="8" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M6 8V5.5a3 3 0 116 0V8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span style="font-size:12px;color:var(--g600)">Pro 플랜에서 열람 가능합니다</span>
          <a href="/#pricing" style="font-size:11px;color:var(--accent);text-decoration:none;font-weight:600">업그레이드 →</a>
        </div>
      </div>`;
    } else {
      bodyHtml=`<div class="prd-sec-body">${s.body||''}</div>`;
    }

    sec.innerHTML=`
      <div class="prd-sec-hd">
        <div style="display:flex;align-items:center">
          <span class="prd-sec-num">${s.num}</span>
          <span class="prd-sec-title">${s.title}</span>
        </div>
        <span style="font-size:10px;color:var(--g500);letter-spacing:1px;text-transform:uppercase">${s.category||''}</span>
      </div>
      ${bodyHtml}`;
    container.appendChild(sec);
  });

  // Free: 업그레이드 배너
  if(!canViewAll&&sections.length>FREE_LIMIT){
    const banner=document.createElement('div');
    banner.style.cssText='margin-top:20px;padding:24px;border:1px solid var(--accent);background:rgba(168,204,0,.06);text-align:center;border-radius:6px';
    banner.innerHTML=`
      <div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:6px">나머지 ${sections.length-FREE_LIMIT}개 섹션이 잠겨 있습니다</div>
      <div style="font-size:12px;color:var(--g600);margin-bottom:14px">역할별 문서, 갈등 분석, 배포 계획을 확인하려면 Pro로 업그레이드하세요.</div>
      <a href="/#pricing" style="display:inline-block;padding:10px 24px;background:var(--accent);color:#fff;font-weight:700;font-size:13px;text-decoration:none">Upgrade to Pro →</a>`;
    container.appendChild(banner);
  }
}

function closePrdDetail(){
  document.getElementById('prd-detail').style.display='none';
  document.getElementById('tab-projects').style.display='block';
}

// ===== TABS =====
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-projects').style.display=tab==='projects'?'block':'none';
  document.getElementById('tab-settings').style.display=tab==='settings'?'block':'none';
  document.getElementById('prd-detail').style.display='none';
}

function checkAndCreateProject(){
  if(userPlan==='free'){
    const items=document.querySelectorAll('.project-item');
    if(items.length>=2){
      alert('Free 플랜은 프로젝트를 최대 2개까지 만들 수 있습니다.\nPro로 업그레이드하면 무제한으로 생성할 수 있습니다.');
      window.location.href='/#pricing';
      return;
    }
  }
  window.location.href='app.html';
}

init();
</script>
</body>
</html>
